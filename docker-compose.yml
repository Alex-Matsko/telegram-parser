services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-price_aggregator}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-price_aggregator}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade heads &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-price_aggregator}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:-}
      TELEGRAM_PROXY_HOST: ${TELEGRAM_PROXY_HOST:-}
      TELEGRAM_PROXY_PORT: ${TELEGRAM_PROXY_PORT:-0}
      TELEGRAM_PROXY_LIST: ${TELEGRAM_PROXY_LIST:-}
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_FALLBACK_MODELS: ${LLM_FALLBACK_MODELS:-}
      LLM_RATE_LIMIT_DELAY: ${LLM_RATE_LIMIT_DELAY:-2.0}
      LLM_CONCURRENCY: ${LLM_CONCURRENCY:-1}
      LLM_MAX_PER_BATCH: ${LLM_MAX_PER_BATCH:-20}
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - telegram_sessions:/app/sessions

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-price_aggregator}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:-}
      TELEGRAM_PROXY_HOST: ${TELEGRAM_PROXY_HOST:-}
      TELEGRAM_PROXY_PORT: ${TELEGRAM_PROXY_PORT:-0}
      TELEGRAM_PROXY_LIST: ${TELEGRAM_PROXY_LIST:-}
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_FALLBACK_MODELS: ${LLM_FALLBACK_MODELS:-}
      LLM_RATE_LIMIT_DELAY: ${LLM_RATE_LIMIT_DELAY:-2.0}
      LLM_CONCURRENCY: ${LLM_CONCURRENCY:-1}
      LLM_MAX_PER_BATCH: ${LLM_MAX_PER_BATCH:-20}
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - telegram_sessions:/app/sessions

  celery-beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-price_aggregator}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_PROXY_HOST: ${TELEGRAM_PROXY_HOST:-}
      TELEGRAM_PROXY_PORT: ${TELEGRAM_PROXY_PORT:-0}
      TELEGRAM_PROXY_LIST: ${TELEGRAM_PROXY_LIST:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_USE_MOCKS: ${VITE_USE_MOCKS:-false}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "3080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  telegram_sessions:
